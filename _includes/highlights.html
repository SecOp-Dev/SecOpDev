{% assign highlights = site.data.data.highlights %}
{% if highlights %}
<section class="section highlights-section">
  <h2 class="section-title">
    <i class="fas fa-chart-line" aria-hidden="true"></i>{{ highlights.title }}
  </h2>

  <ul class="highlights-list">
    {% for item in highlights.list %}
    <li>{{ item }}</li>
    {% endfor %}
  </ul>
</section>
<!--//highlights-section-->
{% endif %}
