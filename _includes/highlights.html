{% assign highlights = site.data.data.highlights %}
{% if highlights %}
<section class="section highlights-section">
  <h2 class="section-title">
    <span class="fa-stack fa-xs">
      <i class="fas fa-circle fa-stack-2x"></i>
      <i class="fas fa-chart-line fa-stack-1x fa-inverse"></i>
    </span>
    {{ highlights.title }}
  </h2>

  <ul class="highlights-list">
    {% for item in highlights.list %}
    <li>{{ item }}</li>
    {% endfor %}
  </ul>
</section>
<!--//highlights-section-->
{% endif %}
