#Update all the sections by editing the data.yml file inside _data folder.

# Site Settings
title: Sean Cullen - Cloud Security Strategist
url: 'https://career.secop.dev'

#change it according to your repository name
# disabling since we are using a custom domain
#baseurl: '/online-cv' 

description: Sean Cullen — Director of Security Operations & Cloud Security Architect specializing in SIEM/SOAR detection engineering, threat hunting, DFIR, automated incident response, and Microsoft Sentinel & Azure security.
# Style will be applied only after restarting the build or serve. Just choose one of the options.
theme_skin: green # blue turquoise green berry orange ceramic teal oceanstale
chrome_mobile_color: #006400 #use hex colors (ex:#1976d2) or leave empty if you don't want a color for chrome mobile searchbar

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Build settings
compress-site: yes

encoding: "utf-8"
compress_html: # - https://career.secop.dev/
  clippings: all
  ignore:
    envs: development

# Development Settings
port: 4000
host: 0.0.0.0
safe: false
