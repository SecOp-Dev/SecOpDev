#Update all the sections by editing the data.yml file inside _data folder.

# Site Settings
title: Sean Cullen - Director of Security Operations
url: 'https://career.secop.dev'

#change it according to your repository name
# disabling since we are using a custom domain
#baseurl: '/online-cv' 

description: Sean Cullen — Director of Security Operations
google_site_verification: # paste your token from Search Console here (e.g. abc123XYZ) & Cloud Security Architect specializing in SIEM/SOAR detection engineering, threat hunting, DFIR, automated incident response, and Microsoft Sentinel & Azure security.
chrome_mobile_color: #0d1117 #use hex colors (ex:#1976d2) or leave empty if you don't want a color for chrome mobile searchbar

# Sass/SCSS
