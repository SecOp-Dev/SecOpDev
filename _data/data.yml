career-profile:
  title: Career Profile
  summary: |
    Hands-on cybersecurity engineer with 5+ years architecting, operating, and continuously improving enterprise-scale detection and response programs across Fortune 200 environments spanning 11,000+ endpoints and 25,000+ users. Deep technical expertise in SIEM/SOAR engineering, EDR/XDR, detection content development, threat hunting, and DFIR. Long-standing partner to the CISO and CIO on Zero Trust roadmaps, secure-by-design cloud architecture, and board-level risk reduction. Passionate about driving down MTTD and MTTR through automation, high-fidelity/low-volume telemetry, and ATT&CK-aligned analytics that prevent material cyber loss.

highlights:
  title: Career Highlights
  list:
  - "$5M+ reduction in annual incident impact through enterprise-wide incident response leadership"
  - "90% reduction in aggregate enterprise risk exposure via secure-by-design cloud architecture"
  - "60% improvement in MTTD/MTTR through SIEM/SOAR detection engineering and automation"
  - "11,000 assets onboarded to EDR/MDR in under 100 days in a greenfield environment"
  - "22,000+ automated incident resolutions engineered across 11,000 endpoints and 25,000 users"

