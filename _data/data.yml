projects:
  title: Projects
  intro: >
  assignments:
  - title: Endpoint Detection & Response
    link:
    tagline: "Led enterprise initiative to standardize endpoint security across a multi-tenant environment through policy development & deployment of EDR tools. Unified security baselines, telemetry collection, and policy governance:<br />
    -  Microsoft Defender, CrowdStrike & DLP agent configuration for 11,000 endpoints:<br />
    -  Consistent detection, prevention, and response capabilities. <br />
    -  Enhance threat visibility and strengthen endpoint protection."

  - title: Microsoft Sentinel
    link:
    tagline: "Designed and implemented a multi-tenant cloud security architecture using Microsoft Sentinel, enabling:<br />
    - Centralized security monitoring and detection across distributed cloud and on-premises environments.<br />
    - Designed and curated scalable log ingestion, cross-tenant data integration, and detection engineering workflows to support unified threat visibility.<br />
    - Built automated response to ensure consistent security governance application across the enterprise."

  - title: MDR Architecture
    link:
    tagline: "Served as SOC lead & lead engineer throughout Managed Detection and Response (MDR) provider integration, onboarding 70+ hybrid cloud and on-premises telemetry sources in under 100 days. Architected redundant Unix-based log collection and secure data forwarding across diverse infrastructure, directly responsible for:<br>
        - Threat Detection in Depth — 2,000 unique MITRE ATT&CK TTP-based alerting.<br />
        - MTTR Reduction — 50%<br />
        - Enterprise Visibility — Single-pane-of-glass for query & remediation capabilities spanning 12+ SaaS solutions.<br />
        - Automated response implementation — across endpoints, identities, and cloud environments."

