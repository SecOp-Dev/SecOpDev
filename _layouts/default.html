#Add "layout: compress" here to compress the html code
---
<!DOCTYPE html>
<!--[if IE 8]> <html lang="en" class="ie8"> <![endif]-->
<!--[if IE 9]> <html lang="en" class="ie9"> <![endif]-->
<!--[if !IE]><!-->
<html lang="en"> <!--<![endif]-->
{% include head.html %}

<body>
  <div class="action-buttons d-print-none">
    <button id="theme-toggle" class="action-btn" aria-label="Toggle theme">
      <i id="theme-icon" class="fas fa-moon"></i>
    </button>
    <button onclick="print()" class="action-btn">
      <i class="fas fa-print"></i> Print
    </button>
    <button onclick="generatePDF()" class="action-btn" id="pdfButton">
      <i class="fas fa-file-pdf"></i> PDF
    </button>
  </div>

  <div class="wrapper">
    {% include sidebar.html %}

    <div class="main-wrapper">
      {{ content }}
    </div>
  </div>

  {% include footer.html %}

  {% include scripts.html %}
  <script src="{{ site.baseurl }}/assets/js/pdf-generator.js"></script>
</body>

</html>
